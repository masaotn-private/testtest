<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設備稼働率管理システム</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans">

<main class="max-w-5xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-6">設備稼働管理ダッシュボード</h1>

<!-- フォーム -->
<form id="work-log-form" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">

<input type="date" id="form-date" required class="border p-2">

<select id="form-machine" class="border p-2"></select>

<select id="form-project" class="border p-2"></select>

<input type="number" id="form-hours" step="0.1" placeholder="時間" class="border p-2">

<input type="number" id="form-price" readonly class="border p-2 bg-gray-100">

<button class="bg-blue-600 text-white px-4 py-2 col-span-2 md:col-span-5">
登録
</button>

</form>

<!-- KPI -->
<div class="flex gap-6 mb-6">
<div>稼働時間: <span id="kpi-hours">0</span></div>
<div>売上: <span id="kpi-revenue">0</span></div>
</div>

<!-- テーブル -->
<table class="w-full border text-sm">
<thead>
<tr class="bg-gray-100">
<th>日付</th>
<th>機械</th>
<th>案件</th>
<th>時間</th>
<th>単価</th>
<th>売上</th>
</tr>
</thead>
<tbody id="work-log-table"></tbody>
</table>

</main>

<script>

// ===== マスタ =====
const clients = {
 1: { name: "AAテクノロジー" },
 2: { name: "BB工業" },
};

const projects = {
 1: { client_id: 1, name: "試作" },
 2: { client_id: 2, name: "量産" },
};

const machines = {
 1: { name: "M1", default_unit_price: 8000 },
 2: { name: "L2", default_unit_price: 5000 },
};

// ===== DBデータ（APIから入る）=====
let workLogs = [];

// ===== データ取得 =====
async function loadData() {
  const res = await fetch("http://127.0.0.1:8001/api/work-logs");
  const data = await res.json();

  workLogs = data;

  render();
}

// ===== 描画 =====
function render() {
  let totalHours = 0;
  let totalRevenue = 0;

  const tbody = document.getElementById("work-log-table");
  tbody.innerHTML = "";

  workLogs.forEach(log => {

    const revenue = log.work_hours * log.unit_price;
    totalHours += log.work_hours;
    totalRevenue += revenue;

    const machine = machines[log.machine_id]?.name || "-";
    const project = projects[log.project_id]?.name || "-";

    const row = `
    <tr>
      <td>${log.date}</td>
      <td>${machine}</td>
      <td>${project}</td>
      <td>${log.work_hours}</td>
      <td>${log.unit_price}</td>
      <td>${revenue}</td>
    </tr>
    `;

    tbody.insertAdjacentHTML("beforeend", row);
  });

  document.getElementById("kpi-hours").innerText = totalHours.toFixed(1);
  document.getElementById("kpi-revenue").innerText = totalRevenue.toLocaleString();

}

// ===== フォーム =====
function initForm() {

  // 初期日付
  document.getElementById("form-date").value =
    new Date().toISOString().split("T")[0];

  // 機械
  const m = document.getElementById("form-machine");
  m.innerHTML = Object.keys(machines).map(id =>
    `<option value="${id}">${machines[id].name}</option>`
  ).join("");

  // 案件
  const p = document.getElementById("form-project");
  p.innerHTML = Object.keys(projects).map(id =>
    `<option value="${id}">${projects[id].name}</option>`
  ).join("");

  // 単価連動
  m.addEventListener("change", e => {
    document.getElementById("form-price").value =
      machines[e.target.value].default_unit_price;
  });

  // 初期単価
  document.getElementById("form-price").value =
    machines[1].default_unit_price;

  // 登録処理
  document.getElementById("work-log-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const newLog = {
      date: document.getElementById("form-date").value,
      machine_id: parseInt(document.getElementById("form-machine").value),
      project_id: parseInt(document.getElementById("form-project").value),
      work_hours: parseFloat(document.getElementById("form-hours").value),
      unit_price: parseInt(document.getElementById("form-price").value)
    };

    // ✅ APIへ保存
    await fetch("http://127.0.0.1:8001/api/work-logs", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(newLog)
    });

    // ✅ 再取得
    await loadData();

    document.getElementById("form-hours").value = "";
  });

}

// ===== 初期化 =====
document.addEventListener("DOMContentLoaded", () => {
  initForm();
  loadData();
});

</script>
</body>
</html>
